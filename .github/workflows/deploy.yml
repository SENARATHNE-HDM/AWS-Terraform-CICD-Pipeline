name: "Terraform AWS CI/CD Pipeline"

on:
  push:
    branches:
      - main  # main බ්‍රාන්ච් එකට කෝඩ් එක push කරපු ගමන් මේක රන් වෙනවා

jobs:
  terraform:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest  # උබුන්ටු සර්වර් එකක් ඇතුළේ තමයි පයිප්ලයින් එක දුවන්නේ

    steps:
      # 1. GitHub එකේ තියෙන අපේ කෝඩ් එක මේ සර්වර් එකට ගැනීම
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. සර්වර් එක ඇතුළට Terraform ඉන්ස්ටෝල් කිරීම
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      # 3. AWS Credentials ඇතුළත් කිරීම (secrets මඟින් ආරක්ෂිතව)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 4. Terraform Init පියවර දුවවීම
      - name: Terraform Init
        run: terraform init

      # 5. Terraform Apply පියවර දුවවීම (ඔටෝ ඇප්ලයි වෙන්න -auto-approve දෙනවා)
      - name: Terraform Apply
        run: terraform apply -auto-approve